services:
  frontend:
    image: ${FRONTEND_IMAGE:-health-analytics-frontend:latest}
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - frontend_net
    depends_on:
      - backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  backend:
    image: ${BACKEND_IMAGE:-health-analytics-backend:latest}
    build: ./backend
    expose:
      - "5000"
    networks:
      - frontend_net
      - backend_net
    environment:
      - DB_SERVER=db
      - DB_DATABASE=healthify
      - DB_USER=sa
      - DB_PASSWORD=Healthify@123
      - DB_PORT=1433
      - NODE_ENV=production
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    networks:
      - backend_net
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Healthify@123"
      MSSQL_PID: "Express"
    volumes:
      - mssqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Healthify@123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G

volumes:
  mssqldata:

networks:
  frontend_net:
    driver: bridge
    internal: false
  backend_net:
    driver: bridge
    internal: true
