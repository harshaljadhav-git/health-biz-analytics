# SonarQube Project Configuration
sonar.projectKey=health-biz-analytics
sonar.projectName=Health Biz Analytics
sonar.projectVersion=1.0.0

# Source directories (comma-separated)
sonar.sources=backend/src,frontend/src

# Test file locations
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclusions from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts,**/*.test.tsx,**/test-setup.ts

# LCOV coverage report paths (generated by Vitest with @vitest/coverage-v8)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Language & encoding
sonar.sourceEncoding=UTF-8

# TypeScript-specific
sonar.typescript.tsconfigPaths=backend/tsconfig.json,frontend/tsconfig.json
